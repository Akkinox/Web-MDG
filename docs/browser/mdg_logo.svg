<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo sutil -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo con brillo (símbolo de limpieza) -->
  <circle cx="20" cy="30" r="16" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
  <circle cx="20" cy="30" r="12" fill="none" stroke="#4a90e2" stroke-width="1.5"/>
  
  <!-- Puntos de brillo -->
  <circle cx="14" cy="22" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="26" cy="36" r="1.5" fill="#ffffff" opacity="0.6"/>
  
  <!-- Línea diagonal (movimiento, dinamismo) -->
  <line x1="10" y1="35" x2="30" y2="25" stroke="#4a90e2" stroke-width="1" opacity="0.7"/>
  
  <!-- Texto MDG -->
  <text x="50" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="-1">MDG</text>
  
  <!-- Línea decorativa bajo MDG -->
  <line x1="50" y1="48" x2="90" y2="48" stroke="#4a90e2" stroke-width="2" opacity="0.8"/>
</svg>